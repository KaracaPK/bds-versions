name: Auto Mirror OnixClient Release

on:
  schedule:
    - cron: '30 */12 * * *' # รันเช็คทุกๆ 12 ชั่วโมง (ตั้งให้เวลาเหลื่อมกับสคริปต์แรกนิดหน่อย)
  workflow_dispatch: # มีปุ่มกดรันเองได้

jobs:
  mirror-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # จำเป็นต้องมีสิทธิ์นี้เพื่อสร้าง Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest OnixClient Release Info
        id: fetch_info
        run: |
          # ไปดึงข้อมูล API จากต้นทาง
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/OnixClient/onix_compatible_appx/releases/latest)
          
          # แยกข้อมูลที่ต้องใช้
          TAG_NAME=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          RELEASE_NAME=$(echo "$LATEST_RELEASE" | jq -r '.name')
          RELEASE_BODY=$(echo "$LATEST_RELEASE" | jq -r '.body')
          
          # ส่งค่าตัวแปรไปให้ Step ถัดไป
          echo "tag_name=$TAG_NAME" >> $GITHUB_ENV
          echo "release_name=$RELEASE_NAME" >> $GITHUB_ENV
          
          # รองรับข้อความยาวๆ แบบมีหลายบรรทัด
          echo "release_body<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Check if Release Already Exists in Our Repo
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ตรวจสอบว่า repo ของเรามี Tag นี้ถูกสร้างไปหรือยัง จะได้ไม่สร้างซ้ำ
          if gh release view "$tag_name" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
            echo "✅ Release $tag_name มีในระบบของคุณอยู่แล้ว บอทจะข้ามการทำงาน"
          else
            echo "exists=false" >> $GITHUB_ENV
            echo "🚨 พบ Release ใหม่: $tag_name กำลังเริ่มกระบวนการดึงไฟล์..."
          fi

      - name: Download Release Assets (Files)
        if: env.exists == 'false'
        run: |
          mkdir downloaded_assets
          cd downloaded_assets
          
          # ดึงลิงก์โหลดไฟล์ทั้งหมดที่มีใน Release ต้นทาง และโหลดลงมาเก็บไว้
          ASSET_URLS=$(curl -s https://api.github.com/repos/OnixClient/onix_compatible_appx/releases/latest | jq -r '.assets[].browser_download_url')
          
          for url in $ASSET_URLS; do
            echo "⬇️ กำลังดาวน์โหลด: $url"
            curl -L -O "$url"
          done

      - name: Create Release in Our Repo
        if: env.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          name: ${{ env.release_name }}
          body: |
            ${{ env.release_body }}
            
            ---
            *🤖 Auto-mirrored from [OnixClient/onix_compatible_appx](https://github.com/OnixClient/onix_compatible_appx/releases/tag/${{ env.tag_name }})*
          files: downloaded_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
