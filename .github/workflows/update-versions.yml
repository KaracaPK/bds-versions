name: Detect Minecraft Bedrock Versions

on:
  schedule:
    - cron: '0 */6 * * *' # ตั้งเวลารันทุก 6 ชั่วโมง
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write # จำเป็นมาก เพื่อให้บอทมีสิทธิ์เซฟไฟล์

    steps:
      # 1. ดึงโค้ดใน Repository ปัจจุบัน
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. รันบอทเช็คเวอร์ชั่นของ Minecraft
      - name: Detect Minecraft Versions
        uses: jedipunkz/detect-minecraft-versions@v1.0.0

      # 3. เซฟไฟล์และอัปโหลดขึ้น GitHub อัตโนมัติ (แก้ปัญหา Error 128)
      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "อัปเดตเวอร์ชั่น Minecraft ล่าสุด"
          file_pattern: "versions.json"
