name: Detect Minecraft Bedrock Versions

on:
  schedule:
    - cron: '0 */6 * * *' # รันทุกๆ 6 ชั่วโมง
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch API and Update Versions
        run: |
          # 1. โหลดข้อมูลจาก "API ลับ" ของ Minecraft โดยตรง (ไม่มีวันโดนบล็อก)
          API_URL="https://net-secondary.web.minecraft-services.net/api/v1.0/download/links"
          JSON_DATA=$(curl -s "$API_URL")
          
          # 2. ใช้คำสั่ง jq ค้นหา Link ดาวน์โหลดแต่ละแพลตฟอร์มจากใน API
          WIN_URL=$(echo "$JSON_DATA" | jq -r '.result.links[] | select(.downloadType == "serverBedrockWindows") | .downloadUrl' | head -1)
          LINUX_URL=$(echo "$JSON_DATA" | jq -r '.result.links[] | select(.downloadType == "serverBedrockLinux") | .downloadUrl' | head -1)
          WIN_PREV_URL=$(echo "$JSON_DATA" | jq -r '.result.links[] | select(.downloadType == "serverBedrockWindowsPreview") | .downloadUrl' | head -1)
          LINUX_PREV_URL=$(echo "$JSON_DATA" | jq -r '.result.links[] | select(.downloadType == "serverBedrockLinuxPreview") | .downloadUrl' | head -1)
          
          # 3. ใช้ Regex ตัดเอาเฉพาะ "ตัวเลขเวอร์ชั่น" ออกมาจากลิ้งก์ (เช่น 1.21.x.xx)
          VER_STABLE=$(echo "$WIN_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          VER_PREVIEW=$(echo "$WIN_PREV_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          
          # 4. (กันเหนียว) ถ้าไม่มีเวอร์ชั่น Preview ให้ใส่ค่าว่างแทน เพื่อไม่ให้สคริปต์พัง
          VER_STABLE=${VER_STABLE:-"0.0.0.0"}
          VER_PREVIEW=${VER_PREVIEW:-"0.0.0.0"}
          WIN_PREV_URL=${WIN_PREV_URL:-""}
          LINUX_PREV_URL=${LINUX_PREV_URL:-""}
          
          # 5. สร้างและเขียนข้อมูลลงไฟล์ versions.json
          cat <<EOF > versions.json
          {
            "latest": {
              "stable": {
                "version": "$VER_STABLE",
                "windows": "$WIN_URL",
                "linux": "$LINUX_URL"
              },
              "preview": {
                "version": "$VER_PREVIEW",
                "windows": "$WIN_PREV_URL",
                "linux": "$LINUX_PREV_URL"
              }
            }
          }
          EOF

      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🚀 อัปเดตเวอร์ชั่น Minecraft อัตโนมัติ (ผ่าน API)"
          file_pattern: "versions.json"
